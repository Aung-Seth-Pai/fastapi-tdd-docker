services:
  web:
    build: ./backend
    command: uvicorn app.main:app --reload --workers 1 --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/usr/src/app
    ports:
      - "8004:8000"
    environment:
      - ENVIRONMENT=dev
      - TESTING=0
      - DATABASE_URL=postgres://postgres:password@db:5432/web_dev
    depends_on:
      db:
        condition: service_healthy

  test:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    command: python -m pytest
    volumes:
      - ./backend:/usr/src/app
    environment:
      - ENVIRONMENT=dev
      - TESTING=1
      - DATABASE_URL=postgres://postgres:password@db:5432/web_test
    depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: